<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scope Checker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f7fa;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            background: #ffffff;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
        }
        h1 {
            margin-bottom: 1rem;
            text-align: center;
        }
        form > div {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            margin-bottom: 0.25rem;
            font-weight: bold;
        }
        textarea {
            width: 100%;
            min-height: 120px;
            padding: 0.5rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: vertical;
        }
        .radio-group {
            margin-bottom: 1rem;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background-color: #2563eb;
            color: #ffffff;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        .back {
            display: block;
            margin-top: 1rem;
            text-align: center;
        }
        .back a {
            color: #2563eb;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Scope Checker</h1>
    <form method="post" action="/scope">
        <div>
            <label for="id_input">Enter one or more IDs (comma or newline separated)</label>
            <textarea name="id_input" id="id_input" required></textarea>
        </div>
        <div class="radio-group">
            <label>Select ID Type:</label>
            <label><input type="radio" name="id_type" value="unified" checked> Unified Site ID</label>
            <label><input type="radio" name="id_type" value="tawal"> TAWAL ID</label>
        </div>
        <button type="submit">Check Scope</button>
    </form>
    <div class="back"><a href="/">&larr; Back to Home</a></div>
</div>
</body>
</html>
