<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Checker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f7fa;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            background: #ffffff;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        h1 {
            margin-bottom: 1rem;
            text-align: center;
        }
        form > div {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            margin-bottom: 0.25rem;
            font-weight: bold;
        }
        select, input[type="number"] {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background-color: #2563eb;
            color: #ffffff;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        .back {
            display: block;
            margin-top: 1rem;
            text-align: center;
        }
        .back a {
            color: #2563eb;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Budget Checker</h1>
    <form method="post" action="/budget">
        <div>
            <label for="box1">Contract Type</label>
            <select name="box1" id="box1" required>
                <option value="" disabled selected>-- Select --</option>
                {% for option in box1 %}
                <option value="{{ option }}">{{ option }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label for="box2">Project Name</label>
            <select name="box2" id="box2" required>
                <option value="" disabled selected>-- Select --</option>
                {% for option in box2 %}
                <option value="{{ option }}">{{ option }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label for="box3">Supplier</label>
            <select name="box3" id="box3" required>
                <option value="" disabled selected>-- Select --</option>
                {% for option in box3 %}
                <option value="{{ option }}">{{ option }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label for="box4">Requested Amount</label>
            <input type="number" name="box4" id="box4" step="0.01" min="0" required />
        </div>
        <button type="submit">Check Budget</button>
    </form>
    <div class="back"><a href="/">&larr; Back to Home</a></div>
</div>
</body>
</html>
