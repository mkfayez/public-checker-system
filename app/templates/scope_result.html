<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scope Check Result</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f7fa;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            background: #ffffff;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
        }
        h1 {
            margin-bottom: 1rem;
            text-align: center;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 0.5rem;
            border: 1px solid #ddd;
        }
        th {
            background-color: #f0f4f9;
            text-align: left;
        }
        .error {
            color: #dc2626;
            font-weight: bold;
            margin-bottom: 1rem;
        }
        .back {
            margin-top: 1rem;
            text-align: center;
        }
        .back a {
            color: #2563eb;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Scope Check Result</h1>
    {% if error %}
        <div class="error">{{ error }}</div>
    {% elif results %}
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>SubProject</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                {% for row in results %}
                <tr>
                    <td>{{ row.id }}</td>
                    <td>{{ row.subproject }}</td>
                    <td>{{ row.status }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    {% endif %}
    <div class="back"><a href="/scope">&larr; Check Another</a> | <a href="/">Home</a></div>
</div>
</body>
</html>
